<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" preserveAspectRatio="none">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e4c2"/>
      <stop offset="0.5" stop-color="#ecd7a8"/>
      <stop offset="1" stop-color="#e4cb96"/>
    </linearGradient>
    <!-- fine vertical grain streaks -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09 0.012" numOctaves="5" seed="14" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.45
                0 0 0 0 0.31
                0 0 0 0 0.16
                0 0 0 0.9 0"/>
    </filter>
  </defs>
  <rect width="160" height="160" fill="url(#base)"/>
  <rect width="160" height="160" filter="url(#grain)" opacity="0.42"/>
</svg>
