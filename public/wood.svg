<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" preserveAspectRatio="none">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#525968"/>
      <stop offset="0.3" stop-color="#3e4352"/>
      <stop offset="0.7" stop-color="#363b4a"/>
      <stop offset="1" stop-color="#2b2f3c"/>
    </linearGradient>
    <!-- horizontal brushed-steel grain -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.18" numOctaves="3" seed="7" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.72
                0 0 0 0 0.76
                0 0 0 0 0.88
                0 0 0 0.28 0"/>
    </filter>
    <!-- top-left specular highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="160" height="160" fill="url(#base)"/>
  <rect width="160" height="160" filter="url(#grain)" opacity="0.52"/>
  <rect width="160" height="160" fill="url(#shine)"/>
</svg>
